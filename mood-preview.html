<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 기분 선택 — 미리보기</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Apple SD Gothic Neo',sans-serif;background:#fdf8f0;min-height:100vh}

  .phone{width:390px;min-height:800px;background:#fdf8f0;border-radius:40px;border:3px solid #d1d5db;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.15);margin:30px auto;position:relative}
  .notch{width:150px;height:28px;background:#d1d5db;border-radius:0 0 20px 20px;margin:0 auto}
  .screen{padding:0;display:flex;flex-direction:column;min-height:740px}
  .header{background:rgba(255,255,255,0.95);border-bottom:1px solid #e5e7eb;padding:10px 20px;display:flex;align-items:center;gap:8px}
  .header h2{color:#2d6a4f;font-size:18px;font-weight:800}
  .content{flex:1;padding:20px 16px;overflow-y:auto}

  .title{text-align:center;font-size:28px;font-weight:800;color:#1a1a2e;margin-bottom:6px;line-height:1.4}
  .subtitle{text-align:center;font-size:18px;color:#555;margin-bottom:20px}

  .mood-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .mood-card{background:white;border-radius:20px;padding:12px 8px 14px;text-align:center;border:2px solid #e8e8e8;cursor:pointer;transition:all 0.2s}
  .mood-card:hover{border-color:#2d6a4f;box-shadow:0 4px 16px rgba(45,106,79,0.15);transform:translateY(-2px)}
  .mood-card .label{font-size:18px;font-weight:800;color:#1a1a2e;margin-top:6px}

  .step-label{text-align:center;font-size:13px;color:#aaa;font-weight:700;letter-spacing:2px;margin-bottom:16px}

  .response .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:18px 24px;background:#2d6a4f;color:white;border:none;border-radius:20px;font-size:22px;font-weight:800;cursor:pointer;margin-top:28px;box-shadow:0 4px 12px rgba(45,106,79,0.25)}

  @keyframes floatBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .float{animation:floatBounce 3s ease-in-out infinite;display:inline-block}

  .pages{display:flex;gap:30px;flex-wrap:wrap;justify-content:center;max-width:900px;margin:0 auto}
</style>
</head>
<body>

<h1 style="text-align:center;font-size:28px;color:#2d6a4f;margin:30px 0 8px">오늘의 기분 선택 — 미리보기</h1>
<p style="text-align:center;font-size:16px;color:#888;margin-bottom:10px">Step 1: 기분 선택 → Step 2: 응답</p>
